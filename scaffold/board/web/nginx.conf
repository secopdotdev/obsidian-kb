# nginx.conf — mission-control
# Served by nginx/nginx-unprivileged on port 8080.
# Security headers are NOT set here — Traefik Middleware owns them.
# Pagefind WASM and CSS are served from /pagefind/ (generated postbuild).

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Serve files; fall back to /404.html for unknown paths.
    # Astro static output uses directory-style URLs (/notes/foo/ → /notes/foo/index.html).
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Immutable cache for Astro-generated assets (hashed filenames).
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Cache for Pagefind index and WASM (changes only on rebuild).
    location /pagefind/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # No-cache for HTML (versioned by Astro).
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Deny hidden files.
    location ~ /\. {
        deny all;
    }

    # Disable access log to stdout to avoid leaking paths in non-debug mode.
    # Re-enable for troubleshooting: access_log /var/log/nginx/access.log;
    access_log off;
    error_log  /var/log/nginx/error.log warn;
}
